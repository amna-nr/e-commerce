

services:

  # --- PostgreSQL Database ---
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres        # matches your DATABASE_URL
      POSTGRES_PASSWORD: password    # matches your DATABASE_URL
      POSTGRES_DB: store             # matches your DATABASE_URL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # --- FastAPI Backend ---
  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env               # loads your entire .env file
    depends_on:
      - db

  # --- React Frontend ---
  frontend:
    build: ./frontend/store          # your React project is inside frontend/store
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: